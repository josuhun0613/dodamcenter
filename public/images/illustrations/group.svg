<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 400" fill="none">
  <rect width="400" height="400" rx="24" fill="#FBF9F7"/>
  <!-- Circle arrangement of people -->
  <circle cx="200" cy="200" r="80" stroke="#E8DFD5" stroke-width="2" fill="none"/>
  <!-- Person 1 - top -->
  <circle cx="200" cy="120" r="20" fill="#8B7355" opacity="0.3"/>
  <rect x="190" y="142" width="20" height="25" rx="6" fill="#8B7355" opacity="0.2"/>
  <!-- Person 2 - right -->
  <circle cx="276" cy="165" r="20" fill="#8B7355" opacity="0.25"/>
  <rect x="266" y="187" width="20" height="25" rx="6" fill="#8B7355" opacity="0.18"/>
  <!-- Person 3 - bottom right -->
  <circle cx="260" cy="250" r="20" fill="#D4A574" opacity="0.3"/>
  <rect x="250" y="272" width="20" height="25" rx="6" fill="#D4A574" opacity="0.2"/>
  <!-- Person 4 - bottom left -->
  <circle cx="140" cy="250" r="20" fill="#D4A574" opacity="0.25"/>
  <rect x="130" y="272" width="20" height="25" rx="6" fill="#D4A574" opacity="0.18"/>
  <!-- Person 5 - left -->
  <circle cx="124" cy="165" r="20" fill="#8B7355" opacity="0.2"/>
  <rect x="114" y="187" width="20" height="25" rx="6" fill="#8B7355" opacity="0.15"/>
  <!-- Center connection -->
  <circle cx="200" cy="200" r="24" fill="#8B7355" opacity="0.08"/>
  <circle cx="200" cy="200" r="12" fill="#8B7355" opacity="0.12"/>
  <!-- Label -->
  <text x="200" y="350" text-anchor="middle" font-family="sans-serif" font-size="18" font-weight="600" fill="#8B7355" opacity="0.6">함께 성장하기</text>
</svg>