  <rect x="115" y="225" width="8" height="40" rx="4" fill="#8B7355" opacity="0.15"/>
  <rect x="277" y="225" width="8" height="40" rx="4" fill="#8B7355" opacity="0.15"/>
  <!-- Decorative -->
